<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repository Creator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Canvas untuk animasi particles */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(128, 0, 32, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 0, 0, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, rgba(178, 34, 34, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(18, 18, 18, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        0 0 0 1px rgba(139, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            padding: 40px;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(139, 0, 0, 0.3);
        }

        h1 {
            color: #ffffff;
            margin-bottom: 12px;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b 0%, #8B0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        .subtitle {
            color: #888888;
            margin-bottom: 0;
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #cccccc;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        label .required {
            color: #8B0000;
            margin-left: 4px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(139, 0, 0, 0.3);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: rgba(30, 30, 30, 0.6);
            color: #ffffff;
            font-family: inherit;
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #555555;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #8B0000;
            background: rgba(40, 40, 40, 0.8);
            box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .file-upload-section {
            background: rgba(30, 30, 30, 0.4);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(139, 0, 0, 0.2);
        }

        .file-upload-section > label {
            color: #ffffff;
            margin-bottom: 6px;
        }

        .file-item {
            background: rgba(20, 20, 20, 0.8);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(139, 0, 0, 0.25);
            transition: all 0.3s ease;
        }

        .file-item:hover {
            border-color: rgba(139, 0, 0, 0.4);
            background: rgba(25, 25, 25, 0.9);
        }

        .file-item:last-child {
            margin-bottom: 0;
        }

        .file-input-group {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        input[type="file"] {
            padding: 10px 14px;
            border: 1px solid rgba(139, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(30, 30, 30, 0.6);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            border-color: #8B0000;
            background: rgba(40, 40, 40, 0.8);
        }

        input[type="file"]::file-selector-button {
            padding: 8px 16px;
            background: linear-gradient(135deg, #8B0000 0%, #5a0000 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: linear-gradient(135deg, #a00000 0%, #6a0000 100%);
            transform: translateY(-1px);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B0000 0%, #5a0000 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #a00000 0%, #6a0000 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #1a5f3f 0%, #0d3321 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(26, 95, 63, 0.3);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #1f7049 0%, #11442a 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(26, 95, 63, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #b71c1c 0%, #7f0000 100%);
            color: white;
            padding: 10px 20px;
            font-size: 13px;
            box-shadow: 0 2px 10px rgba(183, 28, 28, 0.3);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #d32f2f 0%, #9a0000 100%);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .add-file-btn {
            width: 100%;
            margin-top: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(30, 30, 30, 0.4);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(139, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .checkbox-group:hover {
            background: rgba(35, 35, 35, 0.5);
            border-color: rgba(139, 0, 0, 0.3);
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #8B0000;
        }

        .checkbox-group label {
            margin: 0;
            text-transform: none;
            letter-spacing: normal;
            font-weight: 500;
        }

        .status {
            margin-top: 24px;
            padding: 18px 20px;
            border-radius: 12px;
            display: none;
            border-left: 4px solid;
        }

        .status.success {
            background: rgba(26, 95, 63, 0.2);
            color: #4ade80;
            border-color: #22c55e;
        }

        .status.error {
            background: rgba(183, 28, 28, 0.2);
            color: #ff6b6b;
            border-color: #dc2626;
        }

        .status.info {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-color: #3b82f6;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 24px;
        }

        .spinner {
            border: 4px solid rgba(139, 0, 0, 0.2);
            border-top: 4px solid #8B0000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            margin-top: 16px;
            color: #888888;
            font-weight: 500;
        }

        /* FANCY UPLOAD ANIMATIONS */
        .upload-progress-container {
            display: none;
            margin-top: 30px;
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(139, 0, 0, 0.3);
        }

        .upload-progress-container.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .progress-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .progress-percentage {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b 0%, #8B0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .progress-bar-container {
            position: relative;
            width: 100%;
            height: 30px;
            background: rgba(30, 30, 30, 0.6);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(139, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8B0000 0%, #ff6b6b 50%, #8B0000 100%);
            background-size: 200% 100%;
            border-radius: 15px;
            transition: width 0.5s ease;
            animation: shimmer 2s linear infinite;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.6);
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: wave 1.5s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        @keyframes wave {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .file-status-list {
            margin-top: 20px;
        }

        .file-status-item {
            background: rgba(30, 30, 30, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #666;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .file-status-item.uploading {
            border-left-color: #ff6b6b;
            animation: borderPulse 1s ease-in-out infinite;
        }

        .file-status-item.success {
            border-left-color: #22c55e;
            animation: successPop 0.5s ease;
        }

        .file-status-item.error {
            border-left-color: #dc2626;
        }

        @keyframes borderPulse {
            0%, 100% { border-left-width: 3px; }
            50% { border-left-width: 6px; }
        }

        @keyframes successPop {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .file-status-name {
            color: #cccccc;
            font-weight: 500;
        }

        .file-status-icon {
            font-size: 20px;
        }

        /* Confetti Canvas */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Success Checkmark Animation */
        .success-checkmark {
            display: none;
            width: 80px;
            height: 80px;
            margin: 20px auto;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            position: relative;
            animation: scaleIn 0.5s ease;
        }

        .success-checkmark.show {
            display: block;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .checkmark-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
        }

        .checkmark-icon::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 30px;
            border: solid white;
            border-width: 0 5px 5px 0;
            transform: rotate(45deg);
            animation: drawCheck 0.5s ease 0.3s forwards;
            opacity: 0;
        }

        @keyframes drawCheck {
            to {
                opacity: 1;
            }
        }

        /* Sound Toggle Button */
        .sound-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8B0000 0%, #5a0000 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .sound-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(139, 0, 0, 0.6);
        }

        .sound-toggle.muted {
            background: linear-gradient(135deg, #444 0%, #222 100%);
        }

        .help-text {
            font-size: 12px;
            color: #666666;
            margin-top: 8px;
            font-weight: 400;
        }

        .repo-link {
            margin-top: 12px;
            word-break: break-all;
        }

        .repo-link a {
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .repo-link a:hover {
            color: #8B0000;
            text-decoration: underline;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 26px;
            }

            .file-input-group {
                grid-template-columns: 1fr;
            }

            .btn-danger {
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <canvas id="confettiCanvas"></canvas>
    
    <button class="sound-toggle" id="soundToggle" title="Toggle Sound">🔊</button>
    
    <div class="container">
        <div class="header">
            <h1>🚀 GitHub Repository Creator</h1>
            <p class="subtitle">Buat repositori GitHub dan upload multiple file sekaligus</p>
        </div>

        <form id="repoForm">
            <div class="form-group">
                <label for="repoName">Nama Repository <span class="required">*</span></label>
                <input type="text" id="repoName" required placeholder="nama-repo-saya">
                <p class="help-text">Gunakan huruf kecil, angka, dan tanda hubung (-)</p>
            </div>

            <div class="form-group">
                <label for="description">Deskripsi Repository</label>
                <textarea id="description" placeholder="Deskripsi singkat tentang repository ini"></textarea>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="isPrivate">
                    <label for="isPrivate" style="margin: 0;">🔒 Private Repository</label>
                </div>
            </div>

            <div class="file-upload-section">
                <label>File untuk Diupload <span class="required">*</span></label>
                <p class="help-text" style="margin-bottom: 15px;">Tambahkan file yang ingin diupload ke repository</p>
                
                <div id="filesList">
                    <div class="file-item" data-index="0">
                        <div class="file-input-group">
                            <input type="file" class="file-input" required>
                            <input type="text" class="file-path" placeholder="path/to/file.txt" value="">
                            <button type="button" class="btn btn-danger remove-file" style="display: none;">Hapus</button>
                        </div>
                        <p class="help-text">Path kosong = file di root folder</p>
                    </div>
                </div>

                <button type="button" class="btn btn-secondary add-file-btn" id="addFileBtn">
                    + Tambah File Lainnya
                </button>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">
                Buat Repository & Upload File
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Sedang memproses...</p>
        </div>

        <div class="upload-progress-container" id="uploadProgress">
            <div class="progress-header">
                <div class="progress-title">Uploading Files</div>
                <div class="progress-percentage" id="progressPercentage">0%</div>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
            
            <div class="file-status-list" id="fileStatusList"></div>
            
            <div class="success-checkmark" id="successCheckmark">
                <div class="checkmark-icon"></div>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        // ===== PARTICLE ANIMATION =====
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 1;
                this.speedY = -Math.random() * 2 - 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.opacity = Math.random() * 0.5 + 0.3;
                
                // Random red/orange colors
                const colors = [
                    'rgba(139, 0, 0,',      // Dark red
                    'rgba(178, 34, 34,',    // Firebrick
                    'rgba(220, 20, 60,',    // Crimson
                    'rgba(255, 69, 0,',     // Red-orange
                    'rgba(255, 99, 71,',    // Tomato
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // Wave properties
                this.wave = Math.random() * Math.PI * 2;
                this.waveSpeed = Math.random() * 0.05 + 0.02;
                this.waveAmplitude = Math.random() * 30 + 10;
            }
            
            update() {
                this.y += this.speedY;
                this.wave += this.waveSpeed;
                this.x += Math.sin(this.wave) * 0.5 + this.speedX;
                
                // Fade out as it goes up
                if (this.y < canvas.height * 0.3) {
                    this.opacity -= 0.005;
                }
                
                // Reset if particle goes off screen
                if (this.y < -10 || this.opacity <= 0 || this.x < -10 || this.x > canvas.width + 10) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.save();
                
                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color + this.opacity + ')';
                
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color + this.opacity + ')';
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // Create particles
        const particlesArray = [];
        const numberOfParticles = 100;
        
        for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push(new Particle());
        }
        
        // Animation loop
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            
            requestAnimationFrame(animateParticles);
        }
        
        animateParticles();
        
        // ===== CONFETTI ANIMATION =====
        const confettiCanvas = document.getElementById('confettiCanvas');
        const confettiCtx = confettiCanvas.getContext('2d');
        
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
        
        window.addEventListener('resize', () => {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        });
        
        class Confetti {
            constructor() {
                this.x = Math.random() * confettiCanvas.width;
                this.y = -10;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 10;
                
                const colors = ['#8B0000', '#ff6b6b', '#dc2626', '#b71c1c', '#ff4444'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                
                if (this.y > confettiCanvas.height) {
                    return false;
                }
                return true;
            }
            
            draw() {
                confettiCtx.save();
                confettiCtx.translate(this.x, this.y);
                confettiCtx.rotate((this.rotation * Math.PI) / 180);
                confettiCtx.fillStyle = this.color;
                confettiCtx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                confettiCtx.restore();
            }
        }
        
        let confettiArray = [];
        let confettiActive = false;
        
        function launchConfetti() {
            confettiActive = true;
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    confettiArray.push(new Confetti());
                }, i * 10);
            }
            
            setTimeout(() => {
                confettiActive = false;
            }, 3000);
        }
        
        function animateConfetti() {
            if (confettiArray.length > 0 || confettiActive) {
                confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                
                confettiArray = confettiArray.filter(confetti => {
                    confetti.update();
                    confetti.draw();
                    return confetti.y <= confettiCanvas.height;
                });
            }
            
            requestAnimationFrame(animateConfetti);
        }
        
        animateConfetti();
        
        // ===== SOUND EFFECTS =====
        let soundEnabled = true;
        
        const soundToggle = document.getElementById('soundToggle');
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
            soundToggle.classList.toggle('muted');
        });
        
        // Create audio context for sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        function playSound(frequency, duration, type = 'sine') {
            if (!soundEnabled) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }
        
        function playSuccessSound() {
            if (!soundEnabled) return;
            playSound(523.25, 0.1); // C5
            setTimeout(() => playSound(659.25, 0.1), 100); // E5
            setTimeout(() => playSound(783.99, 0.3), 200); // G5
        }
        
        function playUploadSound() {
            if (!soundEnabled) return;
            playSound(440, 0.05); // A4
        }
        
        function playErrorSound() {
            if (!soundEnabled) return;
            playSound(200, 0.2, 'square');
        }
        
        // ===== FORM HANDLING =====
        let fileCount = 1;

        // Add file button handler
        document.getElementById('addFileBtn').addEventListener('click', function() {
            const filesList = document.getElementById('filesList');
            const newFileItem = document.createElement('div');
            newFileItem.className = 'file-item';
            newFileItem.setAttribute('data-index', fileCount);
            
            newFileItem.innerHTML = `
                <div class="file-input-group">
                    <input type="file" class="file-input" required>
                    <input type="text" class="file-path" placeholder="path/to/file.txt" value="">
                    <button type="button" class="btn btn-danger remove-file">Hapus</button>
                </div>
                <p class="help-text">Path kosong = file di root folder</p>
            `;
            
            filesList.appendChild(newFileItem);
            fileCount++;
            updateRemoveButtons();
        });

        // Remove file handler
        document.getElementById('filesList').addEventListener('click', function(e) {
            if (e.target.classList.contains('remove-file')) {
                e.target.closest('.file-item').remove();
                updateRemoveButtons();
            }
        });

        function updateRemoveButtons() {
            const fileItems = document.querySelectorAll('.file-item');
            fileItems.forEach((item, index) => {
                const removeBtn = item.querySelector('.remove-file');
                if (fileItems.length > 1) {
                    removeBtn.style.display = 'block';
                } else {
                    removeBtn.style.display = 'none';
                }
            });
        }

        // Form submission
        document.getElementById('repoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const repoName = document.getElementById('repoName').value.trim();
            const description = document.getElementById('description').value.trim();
            const isPrivate = document.getElementById('isPrivate').checked;
            
            const submitBtn = document.getElementById('submitBtn');
            const uploadProgress = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('progressBar');
            const progressPercentage = document.getElementById('progressPercentage');
            const fileStatusList = document.getElementById('fileStatusList');
            const successCheckmark = document.getElementById('successCheckmark');
            const status = document.getElementById('status');
            
            // Get all files
            const fileInputs = document.querySelectorAll('.file-input');
            const filePaths = document.querySelectorAll('.file-path');
            
            const files = [];
            for (let i = 0; i < fileInputs.length; i++) {
                if (fileInputs[i].files.length > 0) {
                    const file = fileInputs[i].files[0];
                    let path = filePaths[i].value.trim();
                    
                    if (!path) {
                        path = file.name;
                    }
                    
                    files.push({
                        file: file,
                        path: path
                    });
                }
            }
            
            if (files.length === 0) {
                showStatus('error', 'Pilih minimal satu file untuk diupload!');
                playErrorSound();
                return;
            }
            
            // Show upload progress
            submitBtn.disabled = true;
            uploadProgress.classList.add('active');
            status.style.display = 'none';
            fileStatusList.innerHTML = '';
            successCheckmark.classList.remove('show');
            
            // Create file status items
            files.forEach((fileObj, index) => {
                const statusItem = document.createElement('div');
                statusItem.className = 'file-status-item';
                statusItem.id = `file-status-${index}`;
                statusItem.innerHTML = `
                    <span class="file-status-name">${fileObj.path}</span>
                    <span class="file-status-icon">⏳</span>
                `;
                fileStatusList.appendChild(statusItem);
            });
            
            try {
                // Step 1: Create repository
                updateProgress(10, 'Membuat repository...');
                playUploadSound();
                
                const formData = new FormData();
                formData.append('repoName', repoName);
                formData.append('description', description);
                formData.append('isPrivate', isPrivate);
                
                for (let i = 0; i < files.length; i++) {
                    formData.append('files', files[i].file);
                    formData.append('paths', files[i].path);
                }
                
                updateProgress(20, 'Repository dibuat, mulai upload file...');
                
                // Simulate upload progress for each file
                const progressPerFile = 70 / files.length;
                
                for (let i = 0; i < files.length; i++) {
                    const statusItem = document.getElementById(`file-status-${i}`);
                    statusItem.classList.add('uploading');
                    
                    updateProgress(20 + (i * progressPerFile), `Mengupload ${files[i].path}...`);
                    playUploadSound();
                    
                    // Simulate upload delay
                    await new Promise(resolve => setTimeout(resolve, 500));
                    
                    statusItem.classList.remove('uploading');
                    statusItem.classList.add('success');
                    statusItem.querySelector('.file-status-icon').textContent = '✅';
                }
                
                updateProgress(90, 'Finalisasi...');
                
                // Send to backend
                const response = await fetch('http://localhost:3000/create-repo', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    updateProgress(100, 'Selesai!');
                    
                    // Show success animations
                    setTimeout(() => {
                        successCheckmark.classList.add('show');
                        playSuccessSound();
                        launchConfetti();
                    }, 300);
                    
                    setTimeout(() => {
                        showStatus('success', 
                            `✅ Repository berhasil dibuat dan ${files.length} file telah diupload!<div class="repo-link">Link: <a href="${result.repoUrl}" target="_blank">${result.repoUrl}</a></div>`
                        );
                        
                        // Reset form
                        document.getElementById('repoForm').reset();
                        
                        const filesList = document.getElementById('filesList');
                        filesList.innerHTML = `
                            <div class="file-item" data-index="0">
                                <div class="file-input-group">
                                    <input type="file" class="file-input" required>
                                    <input type="text" class="file-path" placeholder="path/to/file.txt" value="">
                                    <button type="button" class="btn btn-danger remove-file" style="display: none;">Hapus</button>
                                </div>
                                <p class="help-text">Path kosong = file di root folder</p>
                            </div>
                        `;
                        fileCount = 1;
                        
                        // Hide progress after delay
                        setTimeout(() => {
                            uploadProgress.classList.remove('active');
                        }, 3000);
                        
                    }, 1500);
                } else {
                    playErrorSound();
                    showStatus('error', `❌ Error: ${result.error}`);
                    uploadProgress.classList.remove('active');
                }
                
            } catch (error) {
                playErrorSound();
                showStatus('error', `❌ Error: ${error.message}. Pastikan backend server sudah berjalan!`);
                uploadProgress.classList.remove('active');
            } finally {
                submitBtn.disabled = false;
            }
        });
        
        function updateProgress(percentage, message) {
            const progressBar = document.getElementById('progressBar');
            const progressPercentage = document.getElementById('progressPercentage');
            
            progressBar.style.width = percentage + '%';
            progressPercentage.textContent = Math.round(percentage) + '%';
        }
        
        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.innerHTML = message;
            status.style.display = 'block';
        }
    </script>
</body>
</html>
